<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theatre Booking</title>

    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <div class="navbar">
        <h1>CINEMA</h1>
    </div>

    <div class="movies-container">

        {% for movie in movies %}

        <div class="movie-card">
            <img src="{{ movie.image.url }}" alt="">

            <div class="movie-info">
                <h2>{{ movie.title }}</h2>
                <p>{{ movie.language }}</p>
                <p>{{ movie.duration }}</p>

                <a href="{% url 'movie_detail' movie.id %}">
                    <button>Book Now</button>
                </a>
            </div>
        </div>

        {% endfor %}

    </div>
    <div class="navbar">

    <h1>🎬 Theatre Booking</h1>

    <div class="nav-links">

        <a href="{% url 'profile' %}">
            Profile
        </a>

        <a href="{% url 'logout' %}">
            Logout
        </a>

    </div>

</div>

</body>
</html>
