<!DOCTYPE html>
<html>
<head>

    <title>Profile</title>
    <link rel="stylesheet" href="/static/css/style.css">

</head>
<body>
<div class="navbar">
    <h1>👤 My Profile</h1>
    <div class="nav-links">
        <a href="/home/">
            Home
        </a>

        <a href="{% url 'logout' %}">
            Logout
        </a>

    </div>

</div>

<div class="profile-container">

    <h2>
        Welcome, {{ request.user.username }}
    </h2>

    <h3>
        My Bookings
    </h3>

    {% for booking in bookings %}

        <div class="booking-card">

            <h2>{{ booking.movie.title }}</h2>

            <p>
                Show:
                {{ booking.show.timing }}
            </p>

            <p>
                Seats:
                {{ booking.seat_number }}
            </p>

            <p>
                Amount:
                ₹{{ booking.total_price }}
            </p>

        </div>

    {% empty %}

        <p>No bookings yet</p>

    {% endfor %}

</div>

</body>
</html>
